<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentru tine</title>
    <style>
        /* Stilurile pentru pagină */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffeff5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* Fereastra de introducere a numelui */
        #input-section {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.2); 
            transition: opacity 0.5s;
        }

        h1 {
            color: #ff9800; 
            margin-bottom: 20px;
            font-size: 2rem;
        }

        input {
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid #ffcc80; 
            border-radius: 8px;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }

        input:focus {
            border-color: #ff9800; 
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            color: white;
            background-color: #ff9800; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #e68a00;
            transform: scale(1.05);
        }

        /* Secțiunea cu animația de iubire */
        #animation-section {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .heart {
            color: #ff9800; 
            font-size: 6rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s, heartbeat 1.2s infinite 2s;
        }

        .love-text {
            font-size: 3.5rem;
            color: #e68a00; 
            font-weight: bold;
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
        }

        .footer {
            margin-top: 50px;
            font-size: 1.5rem;
            color: #b36b00;
            font-style: italic;
            opacity: 0;
            animation: fadeIn 2s forwards 2.5s;
        }

        /* Definiția animațiilor */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(20px); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.3); }
            60%, 100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="input-section">
        <h1>Enter your name</h1>
        <input type="text" id="nameInput" placeholder="Numele aici..." autocomplete="off">
        <br>
        <button onclick="startAnimation()">Enter</button>
    </div>

    <div id="animation-section">
        <div class="heart">🧡</div>
        <div class="love-text">I love you, <span id="displayName"></span>!</div>
        <div class="footer">By Filip</div>
    </div>

    <script>
        function startAnimation() {
            // Preluăm numele din căsuța de text
            const rawName = document.getElementById('nameInput').value.trim();
            
            // Transformăm numele în litere mici pentru a verifica mai ușor (ca să meargă și dacă scrie "LARISA" sau "larisa")
            const nameLowerCase = rawName.toLowerCase();
            
            // Lista cu numele permise
            const allowedNames = ["larisa", "lari", "ecaterina"];

            // Verificăm dacă a introdus un nume
            if (rawName === "") {
                alert("Te rog să introduci un nume!");
                return;
            }

            // Verificăm dacă numele introdus se află în lista de nume permise
            if (!allowedNames.includes(nameLowerCase)) {
                alert("Nume greșit! Acest mesaj este rezervat doar pentru o anumită persoană. 😉");
                return;
            }

            // Punem numele (așa cum l-a scris ea prima dată) în textul animației
            document.getElementById('displayName').innerText = rawName;

            // Ascundem prima secțiune
            document.getElementById('input-section').style.display = 'none';
            
            // Afișăm a doua secțiune
            document.getElementById('animation-section').style.display = 'flex';
        }

        // Permitem apăsarea tastei Enter pentru a trimite numele
        document.getElementById("nameInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                startAnimation();
            }
        });
    </script>
</body>
</html>
