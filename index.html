<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Red Flags în Business</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #d9534f;
            text-align: center;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #fff3f3;
            border-left: 5px solid #d9534f;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚩 Semnale de Alarmă în Business</h1>
    <p class="subtitle">Atenție la aceste 3 detalii nonverbale în următoarea ta întâlnire:</p>
    
    <ul id="flagList">
        </ul>

    <button class="btn" onclick="genereazaRedFlags()">Generează alte 3 semnale</button>
</div>

<script>
    const redFlags = [
        "<strong>Bariere fizice:</strong> Ținerea unui obiect (laptop, mapă, cană) strâns la piept (defensivă).",
        "<strong>Fidgeting:</strong> Jocul constant cu pixul, inelul sau părul (anxietate, lipsă de pregătire).",
        "<strong>Zâmbetul Pan Am:</strong> Zâmbet fals, doar din buze, fără implicarea ochilor (politețe forțată).",
        "<strong>Brațele încrucișate strâns:</strong> Mai ales dacă pumnii sunt strânși (rezistență sau dezacord).",
        "<strong>Atingerea bazei gâtului:</strong> Frecarea cefei sau ajustarea cravatei (comportament de calmare/stres).",
        "<strong>Evitarea bruscă a contactului vizual:</strong> Ruperea ritmului vizual (ascunderea unui adevăr/disconfort).",
        "<strong>Clipitul excesiv:</strong> Creștere bruscă a ratei de clipire (stres cognitiv sau emoțional intens).",
        "<strong>Micro-expresia de dispreț:</strong> Ridicarea asimetrică a unui colț al gurii (superioritate/respingere).",
        "<strong>Ascunderea mâinilor:</strong> Sub masă sau în buzunare (creierul o percepe ca lipsă de transparență).",
        "<strong>Retragerea bruscă pe scaun:</strong> Lăsarea bruscă pe spătar (refuz fizic, distanțare).",
        "<strong>Efectul de „țestoasă”:</strong> Ridicarea umerilor spre urechi și coborârea capului (nesiguranță).",
        "<strong>Orientarea picioarelor spre ușă:</strong> Trunchiul e spre tine, picioarele spre ieșire (dorința de a pleca).",
        "<strong>Gleznele încrucișate și strânse:</strong> Sub scaun (ancorare fizică, reținere emoțională, tensiune).",
        "<strong>Blocarea vizuală:</strong> Acoperirea ochilor cu mâna sau închiderea prelungită (refuzul informației).",
        "<strong>Culegerea scamelor imaginare:</strong> Curățarea hainelor privind în jos (dezaprobare tăcută, ignorare).",
        "<strong>Strângerea maxilarului:</strong> Pulsarea mușchilor feței (furie reținută, frustrare).",
        "<strong>Verificarea repetată a ceasului/telefonului:</strong> (Lipsă de respect, nerăbdare, dezangajare).",
        "<strong>Strângerea buzelor:</strong> Presate până devin o linie subțire (reținerea unei opinii negative).",
        "<strong>Strângerea de mână „pește mort”:</strong> Moale și fără energie (nesiguranță, neimplicare).",
        "<strong>Respirația superficială:</strong> Schimbare bruscă a ritmului (panică la o întrebare incomodă)."
    ];

    function genereazaRedFlags() {
        // Amestecăm array-ul (Fisher-Yates shuffle)
        let shuffled = [...redFlags];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        // Luăm primele 3 elemente
        let selectate = shuffled.slice(0, 3);
        
        // Le afișăm în HTML
        let listaHtml = document.getElementById("flagList");
        listaHtml.innerHTML = ""; // curățăm lista veche
        
        selectate.forEach(flag => {
            let li = document.createElement("li");
            li.innerHTML = flag;
            listaHtml.appendChild(li);
        });
    }

    // Generăm primele 3 flag-uri când se încarcă pagina
    window.onload = genereazaRedFlags;
</script>

</body>
</html>
